name: Build & push Docker image

# Builds the production image on every push to main and publishes it to GHCR
# (ghcr.io/capnbigal/kenmandesignstudio). The droplet pulls from the registry
# rather than building locally, so the 4 GB VM never runs the heavy .NET publish.
#
# Tags: latest (newest main) + <short-sha> (immutable, for rollbacks).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # Pinned image name (the GitHub repo is "KenTheMan", but we publish as
  # kenmandesignstudio to match docker-compose.yml). Owner is taken from the
  # repo so forks still work; metadata-action lowercases it.
  IMAGE_NAME: ${{ github.repository_owner }}/kenmandesignstudio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
