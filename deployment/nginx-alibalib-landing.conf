# /etc/nginx/sites-available/alibalib-landing.conf
#
# Serves the static platform landing page at the bare domain alibalib.com (+ www).
# Reuses the EXISTING Let's Encrypt cert for alibalib.com (no new cert needed).
#
# Put the page at /var/www/alibalib/index.html (see DEPLOY.md). Install:
#   sudo cp /opt/kenmandesignstudio/deployment/nginx-alibalib-landing.conf /etc/nginx/sites-available/alibalib-landing.conf
#   sudo ln -s /etc/nginx/sites-available/alibalib-landing.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name alibalib.com www.alibalib.com;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alibalib.com www.alibalib.com;

    ssl_certificate     /etc/letsencrypt/live/alibalib.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alibalib.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/alibalib;
    index index.html;

    location / { try_files $uri $uri/ =404; }
    location ~ /\.(ht|git|env) { deny all; return 404; }
}
