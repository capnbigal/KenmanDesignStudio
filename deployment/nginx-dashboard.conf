# /etc/nginx/sites-available/dashboard.conf
#
# Reverse-proxy for the Aspire Dashboard UI (aspire-dashboard on 127.0.0.1:18888).
# The dashboard is a Blazor Server app, so the WebSocket Upgrade headers are required.
# It's protected by the dashboard's own login token (Dashboard__Frontend__BrowserToken).
#
# The shared `map $http_upgrade $connection_upgrade {…}` lives in the awblazor site
# config — do NOT redefine it here.
#
# Install (HTTP first, then certbot adds HTTPS):
#   sudo cp /opt/kenmandesignstudio/deployment/nginx-dashboard.conf /etc/nginx/sites-available/dashboard.conf
#   sudo ln -s /etc/nginx/sites-available/dashboard.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d dashboard.alibalib.com

server {
    listen 80;
    listen [::]:80;
    server_name dashboard.alibalib.com;

    location /.well-known/acme-challenge/ { root /var/www/html; }

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass         http://127.0.0.1:18888;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\.(ht|git|env) { deny all; return 404; }
}
